services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: league_night_test
    ports:
      - "127.0.0.1:${TEST_DATABASE_PORT:-55432}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d league_night_test"]
      interval: 1s
      timeout: 5s
      retries: 30
